<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Booking RedDoorz</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #25D366; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Form Booking RedDoorz</h2>
    <form id="bookingForm">
        <input type="text" id="fName" placeholder="Nama Depan" required>
        <input type="text" id="lName" placeholder="Nama Belakang" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="hp" placeholder="Nomor HP" required>
        <input type="text" id="hotel" placeholder="Nama Hotel RedDoorz" required>
        <button type="submit">Kirim Pesanan ke WhatsApp</button>
    </form>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fName = document.getElementById('fName').value;
            const lName = document.getElementById('lName').value;
            const email = document.getElementById('email').value;
            const hp = document.getElementById('hp').value;
            const hotel = document.getElementById('hotel').value;
            
            const message = `Halo Agent, saya ingin memesan kamar:%0A%0A` +
                            `Nama: ${fName} ${lName}%0A` +
                            `Email: ${email}%0A` +
                            `No. HP: ${hp}%0A` +
                            `Hotel: ${hotel}`;
            
            window.location.href = `https://wa.me/6287830226641?text=${message}`;
        });
    </script>
</body>
</html>
